---
# generate-exec-node-bundle.yml
# Generates a self-contained tarball for a hop or execution node that could
# not be reached during the main installer run.
#
# Tasks execute ON the first controller node (where CA keys, receptor certs,
# and automation-controller-task live). The output tarball is fetched back to
# the installer machine automatically.
#
# Prerequisites:
#   - Main installer has completed successfully on the controller
#   - node_hostname exists in [execution_nodes] in inventory
#   - node has _receptor_hostname, _receptor_type, receptor_peers set in inventory
#   - community.crypto collection available (ships with AAP bundle)
#
# -----------------------------------------------------------------------
# TWO MODES — set installer_on_controller accordingly:
#
#   Mode A — installer on a SEPARATE machine (default, installer_on_controller=false):
#     The installer machine and the controller are different hosts.
#     Container images are read from the installer machine's bundle/images/
#     directory and pushed to the controller during staging.
#     The output tarball is fetched back to the installer machine when done.
#
#     ansible-playbook -i inventory generate-exec-node-bundle.yml \
#       -e node_hostname=<hostname>
#
#   Mode B — installer running ON the controller (installer_on_controller=true):
#     The installer and the controller are the same host.
#     Container images are read directly from the local bundle/images/ directory.
#     The output tarball is left in ~/ on the same machine when done.
#
#     ansible-playbook -i inventory generate-exec-node-bundle.yml \
#       -e node_hostname=<hostname> \
#       -e installer_on_controller=true
# -----------------------------------------------------------------------
#
# Run for the hop node:
#   ansible-playbook -i inventory generate-exec-node-bundle.yml \
#     -e node_hostname=ip-11-0-133-15.eu-west-2.compute.internal
#
# Run for the execution node:
#   ansible-playbook -i inventory generate-exec-node-bundle.yml \
#     -e node_hostname=ip-11-0-159-96.eu-west-2.compute.internal
#
# Optional overrides:
#   -e installer_on_controller=true  Installer runs on the controller (see above)
#   -e include_ee_images=false       Skip bundling EE images (execution nodes only)
#   -e bundle_host=<hostname>        Use a specific controller (default: automationcontroller[0])
#
# Output:
#   ~/receptor-bundle-<node_hostname>.tar.gz
#
# Then on the node (see install-exec-node.yml for details):
#   tar -xzf receptor-bundle-<node_hostname>.tar.gz
#   cd receptor-bundle-<node_hostname>/
#   ansible-playbook install-exec-node.yml -i inventory.yml

- name: "Generate receptor node bundle"
  hosts: "{{ bundle_host | default('automationcontroller[0]') }}"
  gather_facts: true

  vars:
    # node_hostname must be passed via -e and exist in [execution_nodes]
    aap_base_dir:       "{{ ansible_user_dir }}/aap"
    ca_tls_dir:         "{{ aap_base_dir }}/tls"
    receptor_conf_dir:  "{{ aap_base_dir }}/receptor/etc"
    bundle_staging_dir: "/tmp/receptor-bundle-{{ node_hostname }}"
    # bundle_output is on the controller; it is fetched back to the installer at the end
    bundle_output:      "/tmp/receptor-bundle-{{ node_hostname }}.tar.gz"
    _installer_bundle_images:       "{{ playbook_dir }}/bundle/images"
    _installer_bundle_collections:  "{{ playbook_dir }}/collections"
    _collections_tmp_archive:       "/tmp/aap-bundle-collections-{{ node_hostname }}.tar.gz"

    # Node properties from inventory _receptor_* vars.
    # _node_peers prefers receptor_peers (the intent var) over _receptor_peers,
    # because _receptor_peers may be set to [] to work around a Jinja2 attribute
    # filter limitation in init.yml for excluded nodes.
    _node_type:     "{{ hostvars[node_hostname]['_receptor_type'] }}"
    _node_hostname: "{{ hostvars[node_hostname]['_receptor_hostname'] }}"
    _node_peers:    "{{ hostvars[node_hostname]['receptor_peers'] | default(hostvars[node_hostname]['_receptor_peers']) | string | from_yaml }}"
    _node_port:     "{{ hostvars[node_hostname]['_receptor_port']     | default(27199) }}"
    _node_protocol: "{{ hostvars[node_hostname]['_receptor_protocol'] | default('tcp') }}"
    # _system_uuid is read from inventory; required for awx-manage provision_instance.
    # For SSH-accessible nodes the installer's facts.yml derives it; for excluded
    # nodes (no SSH from installer), it must be set explicitly in inventory.
    _node_uuid:     "{{ hostvars[node_hostname]['_system_uuid'] }}"

    # Receptor settings (mirrors installer role defaults)
    receptor_log_level:       info
    receptor_mintls13:        false
    receptor_disable_tls:     false
    receptor_disable_signing: false

    # Container settings
    receptor_image:       "registry.redhat.io/ansible-automation-platform-26/receptor-rhel9:latest"
    container_log_driver: journald
    include_ee_images:    true

    # Installer location mode — controls whether image files are read from the
    # Ansible control machine (false, default) or from the controller's local
    # filesystem (true, when the installer runs on the controller itself).
    # Override with:  -e installer_on_controller=true
    installer_on_controller: false

    # Certificate subject (matches AAP installer defaults).
    # Used only when auto-generating a cert (i.e. when receptor_custom_cert is unset).
    cert_country:  US
    cert_state:    "North Carolina"
    cert_locality: Raleigh
    cert_org:      "Red Hat"
    cert_ou:       Ansible

    # Custom certificate support — bring your own cert/key (e.g. signed by your
    # corporate / enterprise CA instead of the AAP mesh CA). Leave both empty
    # to auto-generate a cert/key signed by the AAP mesh CA (default behaviour).
    #
    # IMPORTANT — receptor enforces a per-node identity in the cert:
    #   - CN must be the node hostname
    #   - SAN dNSName must include the node hostname
    #   - SAN otherName 1.3.6.1.4.1.2312.19.1 (UTF8 = node hostname) — receptor's
    #     node-id OID; receptor verifies this against the peer's announced node id
    # So you cannot share one cert across multiple exec nodes — each node needs
    # its own cert/key with its own hostname embedded in the SANs.
    #
    # IMPORTANT — for the corporate CA to actually be trusted across the mesh,
    # the controllers' mesh-CA.crt must already include it. Re-run the installer
    # with `custom_ca_cert=/path/to/corp-ca.crt` set in the AAP inventory before
    # generating bundles with custom certs. The installer will merge AAP CA +
    # corp CA into mesh-CA.crt on each controller; this playbook then copies
    # that merged file into the bundle (see "Copy mesh CA certificate" task below).
    #
    # Paths are LOCAL to the host running ansible-playbook (the Ansible
    # controller / installer host), NOT the AAP controller. The stat check
    # below uses delegate_to: localhost, and the copy tasks omit remote_src,
    # so Ansible reads the files from this host and pushes them to the AAP
    # controller as part of the bundle. This means you don't need to scp
    # certs to the AAP controller before running the playbook.
    #
    # Example:
    #   ansible-playbook generate-exec-node-bundle.yml -i inventory.yml \
    #     -e node_hostname=ip-10-0-1-5... \
    #     -e receptor_custom_cert=/path/to/receptor.crt \
    #     -e receptor_custom_key=/path/to/receptor.key
    receptor_custom_cert: ""   # path to corp-signed receptor.crt on the installer host
    receptor_custom_key:  ""   # path to matching receptor.key on the installer host

  pre_tasks:

    - name: Validate node_hostname is defined and in inventory
      ansible.builtin.assert:
        that:
          - node_hostname is defined
          - node_hostname in groups.get('execution_nodes', [])
          - hostvars[node_hostname]['_receptor_type'] is defined
          - hostvars[node_hostname]['_receptor_hostname'] is defined
          - hostvars[node_hostname]['_receptor_peers'] is defined
          - hostvars[node_hostname]['_system_uuid'] is defined
        fail_msg: >-
          node_hostname must be defined, present in [execution_nodes], and have
          _receptor_type, _receptor_hostname, _receptor_peers, _system_uuid set
          in inventory. _system_uuid is required for awx-manage provision_instance —
          generate one with: python3 -c 'import uuid; print(uuid.uuid4())'

    - name: Validate custom cert/key — both must be set together or both empty
      ansible.builtin.assert:
        that:
          - (receptor_custom_cert | length > 0) == (receptor_custom_key | length > 0)
        fail_msg: >-
          receptor_custom_cert and receptor_custom_key must both be provided or
          both be empty. Got cert='{{ receptor_custom_cert }}', key='{{ receptor_custom_key }}'.

    - name: Verify prerequisite files exist on this controller
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _prereq_stat
      # ca.key is only needed when AUTO-generating the cert (we sign the CSR with it).
      # When receptor_custom_cert is provided, we don't sign anything, so ca.key is not required.
      # ca.cert and signing_public.pem are always needed (even with custom cert).
      # The merged mesh-CA.crt is checked in a dedicated stat task below.
      loop: >-
        {{
          ([ca_tls_dir + '/ca.key'] if receptor_custom_cert | length == 0 else [])
          + [ca_tls_dir + '/ca.cert',
             receptor_conf_dir + '/signing_public.pem',
             receptor_conf_dir + '/mesh-CA.crt']
        }}

    - name: Fail if any prerequisite file is missing
      ansible.builtin.fail:
        msg: "Missing: {{ item.item }}. Ensure the installer completed on this controller."
      when: not item.stat.exists
      loop: "{{ _prereq_stat.results }}"

    - name: Verify custom cert/key files exist on the installer host (when provided)
      # delegate_to: localhost so the stat runs against the host that's running
      # ansible-playbook (the installer host), not the AAP controller. The copy
      # tasks below match this — they read from the installer host and push the
      # files to the AAP controller.
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _custom_cert_stat
      loop:
        - "{{ receptor_custom_cert }}"
        - "{{ receptor_custom_key }}"
      when: receptor_custom_cert | length > 0
      delegate_to: localhost
      run_once: true

    - name: Fail if a custom cert or key file is not found
      ansible.builtin.fail:
        msg: >-
          Custom cert/key file not found on the installer host: {{ item.item }}.
          Check receptor_custom_cert / receptor_custom_key paths.
          (These paths are on the host running ansible-playbook, not the AAP controller.)
      when:
        - receptor_custom_cert | length > 0
        - not item.stat.exists
      loop: "{{ _custom_cert_stat.results }}"

    - name: Detect receptor image from running container
      ansible.builtin.command:
        cmd: podman inspect receptor --format "{{ '{{' }}.ImageName{{ '}}' }}"
      register: _running_receptor_image
      changed_when: false
      failed_when: false

    - name: Use detected receptor image if available
      ansible.builtin.set_fact:
        receptor_image: "{{ _running_receptor_image.stdout | trim }}"
      when:
        - _running_receptor_image.rc == 0
        - _running_receptor_image.stdout | trim | length > 0

    - name: Show node and receptor image details
      ansible.builtin.debug:
        msg: |
          Node      : {{ node_hostname }} ({{ _node_type }})
          Hostname  : {{ _node_hostname }}
          Peers     : {{ _node_peers | join(', ') }}
          Image     : {{ receptor_image }}

  tasks:

    - name: Create bundle staging directory
      ansible.builtin.file:
        path: "{{ bundle_staging_dir }}"
        state: directory
        mode: '0700'

    - name: Create bundle subdirectories
      ansible.builtin.file:
        path: "{{ bundle_staging_dir }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - certs
        - images

    # TLS certificate — mirrors roles/receptor/tasks/tls.yml.
    # Auto-generation block: skipped when receptor_custom_cert/key are provided.
    - name: Auto-generate receptor TLS certificate signed by AAP mesh CA
      when: receptor_custom_cert | length == 0
      block:

        - name: Generate node private key
          community.crypto.openssl_privatekey:
            path: "{{ bundle_staging_dir }}/certs/receptor.key"
            mode: '0400'

        - name: Generate CSR for node
          community.crypto.openssl_csr_pipe:
            common_name: "{{ _node_hostname }}"
            country_name: "{{ cert_country }}"
            state_or_province_name: "{{ cert_state }}"
            locality_name: "{{ cert_locality }}"
            organization_name: "{{ cert_org }}"
            organizational_unit_name: "{{ cert_ou }}"
            subject_alt_name:
              - "{{ _node_hostname | ansible.containerized_installer.subject_alt_name }}"
              - "otherName:1.3.6.1.4.1.2312.19.1;UTF8:{{ _node_hostname }}"
            privatekey_path: "{{ bundle_staging_dir }}/certs/receptor.key"
          register: _receptor_tls_csr

        - name: Sign node certificate with mesh CA
          community.crypto.x509_certificate:
            path: "{{ bundle_staging_dir }}/certs/receptor.crt"
            csr_content: "{{ _receptor_tls_csr.csr }}"
            privatekey_path: "{{ bundle_staging_dir }}/certs/receptor.key"
            provider: ownca
            ownca_path: "{{ ca_tls_dir }}/ca.cert"
            ownca_privatekey_path: "{{ ca_tls_dir }}/ca.key"
            ownca_privatekey_passphrase: "{{ ca_tls_key_passphrase | default(omit) }}"
            mode: '0640'

    # Custom certificate block: used when receptor_custom_cert/key are provided.
    # The cert MUST already be signed by a CA whose root is in the controllers'
    # mesh-CA.crt (typically: AAP mesh CA, or a corporate CA added via the
    # installer's custom_ca_cert mechanism). Receptor also requires per-node
    # SANs (see vars-section comment) — one cert cannot be reused across nodes.
    #
    # No remote_src: true here — Ansible reads the cert/key from the installer
    # host (where ansible-playbook runs) and pushes them to the AAP controller.
    # This matches the delegate_to: localhost stat check in pre_tasks.
    - name: Copy custom receptor certificate into bundle
      ansible.builtin.copy:
        src: "{{ receptor_custom_cert }}"
        dest: "{{ bundle_staging_dir }}/certs/receptor.crt"
        mode: '0640'
      when: receptor_custom_cert | length > 0

    - name: Copy custom receptor key into bundle
      ansible.builtin.copy:
        src: "{{ receptor_custom_key }}"
        dest: "{{ bundle_staging_dir }}/certs/receptor.key"
        mode: '0400'
      when: receptor_custom_key | length > 0

    # Mesh CA certificate — copy the controller's already-merged mesh-CA.crt.
    # The installer renders mesh-CA.crt as (AAP mesh CA + custom_ca_cert if set)
    # via roles/receptor/templates/mesh-CA.crt.j2 — so this file is the single
    # source of truth for what the mesh trusts. By copying it (rather than just
    # ca.cert), bundles for new nodes automatically inherit any corporate CA
    # the installer was configured with.
    #
    # GUARD against receptor's QUIC 16KB crypto buffer limit:
    # If the merged mesh-CA.crt is too large, the TLS handshake fails with:
    #   CRYPTO_BUFFER_EXCEEDED: received invalid offset NNN, maximum allowed 16384
    # We fail fast here with a clear message rather than ship a broken bundle.
    - name: Stat merged mesh-CA.crt for QUIC size check
      ansible.builtin.stat:
        path: "{{ receptor_conf_dir }}/mesh-CA.crt"
      register: _mesh_ca_stat

    - name: Fail if mesh-CA.crt exceeds receptor's 16KB QUIC crypto buffer
      ansible.builtin.fail:
        msg: >-
          {{ receptor_conf_dir }}/mesh-CA.crt is {{ _mesh_ca_stat.stat.size }} bytes,
          which exceeds receptor's 16384-byte QUIC crypto buffer limit.
          The TLS handshake on the new node would fail with CRYPTO_BUFFER_EXCEEDED.
          Reduce the size of custom_ca_cert in the installer (e.g. ship only the
          intermediate that signed receptor certs, not the full chain), re-run the
          installer to regenerate mesh-CA.crt, then retry this playbook.
      when: _mesh_ca_stat.stat.size >= 16384

    - name: Copy merged mesh CA certificate into bundle
      ansible.builtin.copy:
        src: "{{ receptor_conf_dir }}/mesh-CA.crt"
        dest: "{{ bundle_staging_dir }}/certs/mesh-CA.crt"
        mode: '0644'
        remote_src: true

    - name: Copy work signing public key into bundle
      ansible.builtin.copy:
        src: "{{ receptor_conf_dir }}/signing_public.pem"
        dest: "{{ bundle_staging_dir }}/certs/signing_public.pem"
        mode: '0644'
        remote_src: true

    # CA trust bundle — receptor container mounts this at /etc/pki/ca-trust/extracted
    - name: Archive CA trust extracted directory for bundle
      ansible.builtin.command:
        cmd: >-
          tar -czf {{ bundle_staging_dir }}/ca-trust-extracted.tar.gz
          -C {{ ca_tls_dir }}
          extracted
      changed_when: true

    # Set template variables — mirrors receptor/tasks/facts.yml set_fact outputs.
    # The template uses both plain (receptor_*) and underscore-prefixed (_receptor_*)
    # forms: plain forms drive the listener block; underscore forms drive peer blocks.
    #
    # IMPORTANT: This must run BEFORE adding peer hosts to inventory. If the
    # controller is also a peer (common case), set_fact would overwrite the peer's
    # _receptor_hostname with the target node's hostname, causing tcp-peer blocks
    # to point to the wrong address. By setting facts first, then adding peers,
    # the peer's correct _receptor_hostname takes precedence in hostvars.
    - name: Set template rendering variables
      ansible.builtin.set_fact:
        receptor_type:      "{{ _node_type }}"
        receptor_port:      "{{ _node_port }}"
        receptor_protocol:  "{{ _node_protocol }}"
        _receptor_type:     "{{ _node_type }}"
        _receptor_port:     "{{ _node_port }}"
        _receptor_protocol: "{{ _node_protocol }}"
        _receptor_peers:    "{{ _node_peers }}"

    # Populate in-memory inventory so receptor.conf.j2 can resolve peer hostvars.
    # This MUST run after set_fact above — if the controller is a peer, add_host
    # will (correctly) set its _receptor_hostname to the controller's hostname,
    # overriding the target node hostname set above.
    - name: Add peer hosts to in-memory inventory for template rendering
      ansible.builtin.add_host:
        name: "{{ item }}"
        _receptor_hostname: >-
          {{ hostvars[item]['_receptor_hostname']
             | default(hostvars[item]['ansible_host'] | default(item)) }}
        _receptor_port:     "{{ hostvars[item]['_receptor_port']     | default(27199) }}"
        _receptor_protocol: "{{ hostvars[item]['_receptor_protocol'] | default('tcp') }}"
      loop: "{{ _node_peers }}"

    - name: Generate receptor.conf from installer template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/collections/ansible_collections/ansible/containerized_installer/roles/receptor/templates/receptor.conf.j2"
        dest: "{{ bundle_staging_dir }}/receptor.conf"
        mode: '0644'
      vars:
        _receptor_hostname: "{{ _node_hostname }}"

    # ----------------------------------------------------------------
    # Images — copied directly from bundle/images/ on the installer.
    #
    # remote_src is driven by installer_on_controller:
    #   false (default) → source is on the Ansible control machine (installer);
    #                      Ansible pushes each file to the controller.
    #   true            → source is already on the controller's local filesystem;
    #                      Ansible reads it locally with remote_src: true.
    #
    # No podman save fallback needed — bundle/images/ always contains the
    # pre-built tarballs shipped with the AAP bundle installer.
    # ----------------------------------------------------------------
    - name: Copy receptor image from installer bundle
      ansible.builtin.copy:
        src: "{{ _installer_bundle_images }}/receptor-rhel9.tar.gz"
        dest: "{{ bundle_staging_dir }}/images/receptor-rhel9.tar.gz"
        mode: '0644'
        remote_src: "{{ installer_on_controller | bool }}"

    - name: Copy EE images from installer bundle
      # Execution nodes only — hop nodes only need the receptor image.
      ansible.builtin.copy:
        src: "{{ _installer_bundle_images }}/{{ item }}"
        dest: "{{ bundle_staging_dir }}/images/{{ item }}"
        mode: '0644'
        remote_src: "{{ installer_on_controller | bool }}"
      loop:
        - ee-minimal-rhel9.tar.gz
        - ee-supported-rhel9.tar.gz
      when:
        - include_ee_images | bool
        - _node_type == 'execution'

    # ----------------------------------------------------------------
    # install-exec-node.yml — same remote_src logic as images above.
    # ----------------------------------------------------------------
    - name: Copy install-exec-node.yml into bundle
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/install-exec-node.yml"
        dest: "{{ bundle_staging_dir }}/install-exec-node.yml"
        mode: '0644'
        remote_src: "{{ installer_on_controller | bool }}"

    # ----------------------------------------------------------------
    # Ansible collections — bundle containers.podman and ansible.posix
    # so install-exec-node.yml can run offline on the node without
    # needing internet access or RHEL AppStream collection RPMs.
    #
    # delegate_to: localhost archives on the installer machine regardless
    # of Mode A (separate installer) or Mode B (installer on controller).
    # ansible.builtin.unarchive then copies the archive to the controller
    # staging dir and extracts it there (remote_src: false).
    # ----------------------------------------------------------------
    - name: Archive required Ansible collections on installer machine
      ansible.builtin.command:
        cmd: >-
          tar -czf {{ _collections_tmp_archive }}
          -C {{ _installer_bundle_collections }}
          ansible_collections/containers/podman
          ansible_collections/ansible/posix
      delegate_to: localhost
      changed_when: true

    - name: Extract bundled collections into bundle staging directory
      ansible.builtin.unarchive:
        src: "{{ _collections_tmp_archive }}"
        dest: "{{ bundle_staging_dir }}"
        remote_src: false

    - name: Generate ansible.cfg for bundle
      # Tells ansible-playbook to search for collections in the bundle
      # directory itself (i.e. ansible_collections/ extracted above).
      ansible.builtin.copy:
        dest: "{{ bundle_staging_dir }}/ansible.cfg"
        mode: '0644'
        content: |
          [defaults]
          # Collections are pre-bundled in ansible_collections/
          collections_paths = .

    - name: Generate inventory.yml for node
      ansible.builtin.copy:
        dest: "{{ bundle_staging_dir }}/inventory.yml"
        mode: '0644'
        content: |
          ---
          all:
            hosts:
              {{ node_hostname }}:
                ansible_host: localhost
                ansible_connection: local
                # For remote execution: set ansible_connection: ssh, ansible_host: {{ _node_hostname }}, ansible_user, ansible_ssh_private_key_file

            vars:
              node_hostname: "{{ node_hostname }}"
              node_type: "{{ _node_type }}"
              receptor_port: {{ _node_port }}
              receptor_protocol: "{{ _node_protocol }}"
              receptor_image: "{{ receptor_image }}"
              container_log_driver: "{{ container_log_driver }}"
              bundle_dir: "{{ '{{' }} playbook_dir {{ '}}' }}"

    # AWX database registration — mirrors roles/automationcontroller/tasks/init.yml
    # for nodes excluded from the main installer run. Three steps in order:
    #   1. provision_instance     — create the Instance row in AWX
    #   2. add_receptor_address   — set the listen address/port for the node
    #   3. register_peers         — create peer links from this node to its peers
    # All three are idempotent so re-running this playbook is safe.

    - name: Provision node instance in AWX database
      # Mirrors init.yml "Register the execution/hop instances in the database".
      # provision_instance prints "(changed: True)" only when a new Instance is
      # created; subsequent runs print "(changed: False)" — so this is idempotent.
      ansible.builtin.command:
        cmd: >-
          podman exec automation-controller-task
          awx-manage provision_instance
          --hostname={{ _node_hostname }}
          --uuid={{ _node_uuid }}
          --node_type={{ _node_type }}
      register: _provision_instance
      changed_when: "'(changed: True)' in _provision_instance.stdout"
      retries: 5
      delay: 6
      until: _provision_instance is not failed

    - name: Set receptor listener address for node
      # Mirrors init.yml "Set the receptor listener port".
      # --canonical marks this as the primary address for peer dialing.
      ansible.builtin.command:
        cmd: >-
          podman exec automation-controller-task
          awx-manage add_receptor_address
          --instance={{ _node_hostname }}
          --address={{ _node_hostname }}
          --port={{ _node_port }}
          --canonical
      register: _receptor_address
      changed_when: "'(changed: True)' in _receptor_address.stdout"
      retries: 5
      delay: 6
      until: _receptor_address is not failed

    - name: Register node peers in AWX database
      # Mirrors init.yml "Register other peers in the database".
      # Skipped for nodes with no peers (e.g. controllers). Output "0 peer links
      # added" indicates nothing changed; anything else means new links created.
      ansible.builtin.command:
        cmd: >-
          podman exec automation-controller-task
          awx-manage register_peers {{ _node_hostname }}
          --exact {{ _node_peers | join(' ') }}
      register: _register_peers
      changed_when: not _register_peers.stdout | regex_search('^0 peer links added')
      retries: 5
      delay: 6
      until: _register_peers is not failed
      when: _node_peers | length > 0

    - name: Create bundle tarball
      ansible.builtin.command:
        cmd: >-
          tar -czf {{ bundle_output }}
          -C /tmp
          receptor-bundle-{{ node_hostname }}
      changed_when: true

    - name: Remove staging directory
      ansible.builtin.file:
        path: "{{ bundle_staging_dir }}"
        state: absent

    # Fetch the tarball from the controller back to the installer machine
    - name: Fetch bundle tarball to installer machine
      ansible.builtin.fetch:
        src: "{{ bundle_output }}"
        dest: "{{ lookup('env', 'HOME') }}/{{ bundle_output | basename }}"
        flat: true

    - name: Remove tarball from controller after fetch
      ansible.builtin.file:
        path: "{{ bundle_output }}"
        state: absent

    - name: Display bundle summary
      ansible.builtin.debug:
        msg: |
          Bundle: {{ lookup('env', 'HOME') }}/{{ bundle_output | basename }}
          Node  : {{ node_hostname }} ({{ _node_type }})
          Peers : {{ _node_peers | join(', ') }}
          Image : {{ receptor_image }}

          On the node:
            tar -xzf {{ bundle_output | basename }}
            cd receptor-bundle-{{ node_hostname }}/
            ansible-playbook install-exec-node.yml -i inventory.yml
