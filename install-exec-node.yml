# install-exec-node.yml
# Shipped inside the tarball produced by generate-exec-node-bundle.yml.
# Run ON the hop/execution node itself after extracting the bundle.
#
# Prerequisites on the node:
#   - RHEL 8.6+ or RHEL 9.2+
#   - ansible-core installed  (dnf install ansible-core)  ← needed to run this playbook
#   - Port 27199 open inbound (or whichever receptor_port is configured)
#   - sudo access (needed for: dnf install packages, loginctl, firewalld)
#
# Note: All required packages (ansible-core, podman, crun, polkit, …) are
#   installed automatically by this playbook, but ansible-core must already
#   be present on the node to execute it at all
#   (when running locally via the default inventory.yml connection: local).
#
# Step 1 — Transfer and extract the bundle (from the installer machine):
#   scp ~/receptor-bundle-<hostname>.tar.gz  ec2-user@<node-ip>:~/
#   ssh ec2-user@<node-ip>
#   tar -xzf receptor-bundle-<hostname>.tar.gz
#   cd receptor-bundle-<hostname>/
#
# Step 2 — Run locally on the node (default, inventory.yml uses localhost):
#   ansible-playbook install-exec-node.yml -i inventory.yml
#
# Step 2 (alternative) — Run from a jump host with SSH access to the node:
#   Edit inventory.yml: uncomment ansible_connection/ansible_host/ansible_user lines
#   ansible-playbook install-exec-node.yml -i inventory.yml \
#     --private-key ~/.ssh/your-key.pem
#
# To override any variable at runtime:
#   ansible-playbook install-exec-node.yml -i inventory.yml \
#     -e receptor_port=27199 \
#     -e container_log_driver=journald

- name: "Install receptor on execution/hop node"
  hosts: all
  gather_facts: true

  vars:
    # These are set in inventory.yml (generated by generate-exec-node-bundle.yml)
    # node_hostname:        from inventory
    # node_type:            from inventory  (hop | execution)
    # receptor_port:        from inventory
    # receptor_protocol:    from inventory
    # receptor_image:       from inventory
    # container_log_driver: from inventory
    # bundle_dir:           from inventory (defaults to playbook_dir)

    # AAP base directory — matches installer default (aap_volumes_dir)
    aap_base_dir: "{{ ansible_user_dir }}/aap"

    # Mirrors installer role defaults
    receptor_conf_dir:   "{{ aap_base_dir }}/receptor/etc"
    ca_tls_dir:          "{{ aap_base_dir }}/tls"
    controller_data_dir: "{{ aap_base_dir }}/controller/data"
    aap_podman_path:     "{{ aap_base_dir }}/containers/podman"
    aap_storage_conf:    "{{ aap_base_dir }}/containers/storage.conf"

    # Default PID limit — mirrors common/defaults/main.yml
    podman_default_pids_limit: 47644

  pre_tasks:

    - name: Validate bundle files exist
      ansible.builtin.stat:
        path: "{{ bundle_dir | default(playbook_dir) }}/{{ item }}"
      register: _bundle_files
      loop:
        - certs/receptor.crt
        - certs/receptor.key
        - certs/mesh-CA.crt
        - certs/signing_public.pem
        - receptor.conf
        - images/receptor-rhel9.tar.gz
        - ca-trust-extracted.tar.gz

    - name: Fail if bundle files are missing
      ansible.builtin.fail:
        msg: >-
          Missing bundle file: {{ item.item }}.
          Ensure you extracted the tarball correctly.
      when: not item.stat.exists
      loop: "{{ _bundle_files.results }}"
      loop_control:
        label: "{{ item.item }}"

  tasks:

    # ------------------------------------------------------------------
    # 1. Install prerequisites
    #    Mirrors roles/common/tasks/main.yml — package list matches
    #    common/defaults/main.yml podman_packages plus polkit.
    # ------------------------------------------------------------------
    - name: Ensure ansible-core is installed
      ansible.builtin.package:
        name: ansible-core
        state: present
      become: true

    - name: Ensure container runtime packages are installed
      # Mirrors common/defaults/main.yml podman_packages list.
      # NB: podman-remote is intentionally NOT installed on the host — the
      # receptor image ships it, and the ~/aap/containers/podman wrapper
      # (mounted into the container at /usr/bin/podman) execs the container's
      # /usr/bin/podman-remote. The host only runs the podman *service*
      # (podman package) that podman-remote connects to via the socket.
      ansible.builtin.package:
        name:
          - crun
          - podman
          - slirp4netns
          - fuse-overlayfs
        state: present
      become: true

    - name: Ensure polkit is installed
      # Required for rootless podman systemd socket activation.
      ansible.builtin.package:
        name: polkit
        state: present
      become: true

    - name: Start and enable polkit
      ansible.builtin.service:
        name: polkit
        state: started
        enabled: true
      become: true

    - name: Add service user to systemd-journal group
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: systemd-journal
        append: true
      register: _journal_group
      become: true

    - name: Disable lingering when the journal group changed
      # Mirrors common/tasks/main.yml: when group membership changes, cycle
      # lingering (disable then enable) so the user's systemd manager restarts
      # and picks up the new group before the receptor container runs. The
      # 'removes' guard makes this a no-op on a fresh node (no linger file yet).
      ansible.builtin.command:
        cmd: "loginctl disable-linger {{ ansible_user_id }}"
        removes: "/var/lib/systemd/linger/{{ ansible_user_id }}"
      become: true
      when: _journal_group is changed

    - name: Enable lingering for the service user (containers survive logout)
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ ansible_user_id }}"
        creates: "/var/lib/systemd/linger/{{ ansible_user_id }}"
      become: true

    # ------------------------------------------------------------------
    # 1b. Ensure subordinate UID/GID ranges for rootless containers
    #     Mirrors roles/common/tasks/subids.yml, which runs the collection's
    #     subuid/subgid modules to guarantee the service user owns a
    #     65536-wide subordinate range (the module default). A new range is
    #     placed at the next free id, or 100000 when the file is empty; an
    #     existing entry keeps its start.
    #
    #     Reimplemented with ansible.builtin because the node-side bundle only
    #     ships containers.podman + ansible.posix — neither the
    #     ansible.containerized_installer collection (subuid/subgid modules)
    #     nor community.general is present on the node.
    #
    #     Required in the out-of-band mesh-node workflow: the installer's
    #     common role never runs on these nodes, so nothing else guarantees a
    #     subordinate range. Without one, rootless podman cannot map UIDs for
    #     EE containers. Runs before the podman socket starts (section 3),
    #     matching the installer's ordering. Stock RHEL useradd already
    #     allocates 65536, so this is normally an idempotent no-op.
    #     The ^user: regexp only ever matches this user's own line.
    - name: Ensure /etc/subuid and /etc/subgid exist
      ansible.builtin.copy:
        dest: "/etc/{{ item }}"
        content: ""
        force: false
        owner: root
        group: root
        mode: '0644'
      loop:
        - subuid
        - subgid
      become: true

    - name: Read current subordinate ID ranges
      ansible.builtin.slurp:
        src: "/etc/{{ item }}"
      register: _subid_files
      loop:
        - subuid
        - subgid
      become: true

    - name: Ensure the service user owns a 65536-wide subordinate range
      ansible.builtin.lineinfile:
        path: "/etc/{{ _subid.item }}"
        regexp: "^{{ ansible_user_id | regex_escape }}:"
        line: "{{ ansible_user_id }}:{{ _start }}:65536"
        owner: root
        group: root
        mode: '0644'
      become: true
      loop: "{{ _subid_files.results }}"
      loop_control:
        loop_var: _subid
        label: "/etc/{{ _subid.item }}"
      vars:
        # Parse existing entries (skip blanks/comments) into [name, start, size]
        _lines: "{{ (_subid.content | b64decode).splitlines() | map('trim') | select | reject('match', '^#') | list }}"
        _entries: "{{ _lines | map('split', ':') | list }}"
        # Next free id = highest (start + size) across all entries, else 100000
        _starts: "{{ _entries | map(attribute=1) | map('int') | list }}"
        _sizes: "{{ _entries | map(attribute=2) | map('int') | list }}"
        _ends: "{{ _starts | zip(_sizes) | map('sum') | list }}"
        _next_start: "{{ (_ends | max) if (_ends | length > 0) else 100000 }}"
        # Keep this user's existing start if present; otherwise take next free
        _user_lines: "{{ _lines | select('match', '^' ~ (ansible_user_id | regex_escape) ~ ':') | list }}"
        _start: "{{ (_user_lines[0].split(':'))[1] if (_user_lines | length > 0) else _next_start }}"

    # ------------------------------------------------------------------
    # 1c. Host tuning for execution nodes
    #     Mirrors the host_tuning role, which the installer applies to
    #     execution_nodes when tune_host_limits is true (default). It sets the
    #     kernel.keys / fs.inotify sysctls in /etc/sysctl.d/99-aap.conf, a nofile
    #     ulimit for the service user in /etc/security/limits.d/99-aap-limits.conf,
    #     and computes SystemD TasksMax = min(threads-max * 0.8, pid-max), which
    #     becomes the containers.conf pids_limit in section 3 (mirrors
    #     containers.conf.j2's __systemd_default_tasks_max precedence).
    #
    #     Must run before section 3 so __systemd_default_tasks_max is set when
    #     containers.conf is written. Uses ansible.posix (bundled). Disable with
    #     -e tune_host_limits=false. In the out-of-band mesh-node workflow the
    #     installer never runs here, so this is the only place these limits apply.
    - name: Apply host tuning
      when: tune_host_limits | default(true) | bool
      vars:
        host_tuning_sysctl_fs_inotify_max_user_instances: 8192
        host_tuning_sysctl_fs_inotify_max_user_watches: 524288
        host_tuning_nofile_limit_soft: 524288
        host_tuning_nofile_limit_hard: 524288
      block:
        - name: Read kernel threads-max and pid-max
          ansible.builtin.slurp:
            src: "{{ item }}"
          register: _host_tuning_kernel
          loop:
            - /proc/sys/kernel/threads-max
            - /proc/sys/kernel/pid_max

        - name: Compute SystemD TasksMax (min of 80% threads-max and pid-max)
          # Mirrors host_tuning/tasks/main.yml; consumed by containers.conf below.
          ansible.builtin.set_fact:
            __systemd_default_tasks_max: >-
              {{ [ (_host_tuning_kernel.results[0].content | b64decode | trim | int * 0.8) | int,
                   _host_tuning_kernel.results[1].content | b64decode | trim | int ] | min }}

        - name: Compute kernel.keys.maxkeys
          # Mirrors host_tuning/tasks/sysctl.yml.
          ansible.builtin.set_fact:
            _host_tuning_maxkeys: "{{ [(ansible_memtotal_mb | int // 100) + 100, 4096] | max }}"

        - name: Compute kernel.keys.maxbytes
          ansible.builtin.set_fact:
            _host_tuning_maxbytes: "{{ [(_host_tuning_maxkeys | int) * 100, 409600] | max }}"

        - name: Apply kernel.keys and fs.inotify sysctls in /etc/sysctl.d/99-aap.conf
          ansible.posix.sysctl:
            name: "{{ item.name }}"
            value: "{{ item.value | string }}"
            sysctl_set: true
            state: present
            reload: true
            sysctl_file: /etc/sysctl.d/99-aap.conf
          become: true
          loop:
            - { name: kernel.keys.maxkeys,                value: "{{ _host_tuning_maxkeys }}" }
            - { name: kernel.keys.maxbytes,               value: "{{ _host_tuning_maxbytes }}" }
            - { name: fs.inotify.max_user_instances,      value: "{{ host_tuning_sysctl_fs_inotify_max_user_instances }}" }
            - { name: fs.inotify.max_user_watches,        value: "{{ host_tuning_sysctl_fs_inotify_max_user_watches }}" }
          loop_control:
            label: "{{ item.name }}={{ item.value }}"

        - name: Ensure /etc/security/limits.d exists
          ansible.builtin.file:
            path: /etc/security/limits.d
            state: directory
            mode: '0755'
            owner: root
            group: root
          become: true

        - name: Configure nofile ulimit for the service user
          # Mirrors host_tuning/templates/99-aap-limits.conf.j2.
          ansible.builtin.copy:
            dest: /etc/security/limits.d/99-aap-limits.conf
            mode: '0644'
            owner: root
            group: root
            content: |
              # Set file descriptor limits for the user that runs aap containerized services
              {{ ansible_user_id }} soft nofile {{ host_tuning_nofile_limit_soft }}
              {{ ansible_user_id }} hard nofile {{ host_tuning_nofile_limit_hard }}
          become: true

    # ------------------------------------------------------------------
    # 2. Create host directory structure
    #    Mirrors roles/common/tasks/main.yml and roles/receptor/tasks/config.yml
    # ------------------------------------------------------------------
    - name: Create AAP directory structure
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ aap_base_dir }}",                                            mode: '0750' }
        - { path: "{{ ca_tls_dir }}",                                              mode: '0750' }
        - { path: "{{ receptor_conf_dir }}",                                       mode: '0770' }
        - { path: "{{ controller_data_dir }}/job_execution",                       mode: '0770' }
        - { path: "{{ controller_data_dir }}/projects",                            mode: '0770' }
        - { path: "{{ aap_base_dir }}/containers",                                 mode: '0750' }
        - { path: "{{ ansible_user_dir }}/.config/containers",                     mode: '0755' }
        - { path: "{{ ansible_user_dir }}/.config/systemd/user",                   mode: '0755' }
        - { path: "{{ ansible_user_dir }}/.config/systemd/user/podman.service.d", mode: '0770' }

    - name: Create custom podman rootless storage folder
      # Mirrors roles/common/tasks/executionplane.yml exactly.
      # setype: data_home_t on the DIRECTORY is required — it triggers a SELinux
      # type transition so files created inside by the podman daemon (image layers,
      # overlay dirs) automatically get labeled container_file_t, which container_t
      # (EE container processes) are allowed to read/exec.
      # DO NOT chcon -R this directory to data_home_t — that would relabel the
      # files themselves to data_home_t, which container_t cannot read.
      ansible.builtin.file:
        path: "{{ aap_base_dir }}/containers/storage"
        mode: '0770'
        setype: data_home_t
        state: directory


    # ------------------------------------------------------------------
    # 3. Configure podman
    #    Mirrors roles/common/tasks/main.yml (containers.conf.j2) and
    #    roles/common/tasks/executionplane.yml (storage.conf.j2,
    #    override.conf.j2, podman wrapper).
    # ------------------------------------------------------------------
    - name: Configure podman runtime (containers.conf)
      # Mirrors roles/common/templates/containers.conf.j2, including its
      # pids_limit precedence: the host_tuning-computed __systemd_default_tasks_max
      # when set (section 1c), otherwise the static podman_default_pids_limit.
      ansible.builtin.copy:
        dest: "{{ ansible_user_dir }}/.config/containers/containers.conf"
        mode: '0644'
        content: |
          [engine]
          runtime = "crun"

          [containers]
          pids_limit = {{ __systemd_default_tasks_max | default(podman_default_pids_limit) }}

    # NOTE: No user-level ~/.config/containers/storage.conf is created — the
    # installer doesn't create one either. The custom aap store is scoped to
    # the podman *socket* daemon via override.conf, and EE images are loaded
    # into it with a per-load CONTAINERS_STORAGE_CONF env (section 7). The
    # receptor image/container deliberately stay in podman's default rootless
    # store (matching the installer's control-plane vs execution-plane split).
    - name: Create AAP-managed podman storage.conf
      # Mirrors roles/common/templates/storage.conf.j2.
      # Referenced by override.conf so the podman socket daemon uses it.
      ansible.builtin.copy:
        dest: "{{ aap_storage_conf }}"
        mode: '0640'
        content: |
          [storage]
          driver = "overlay"
          rootless_storage_path = "{{ aap_base_dir }}/containers/storage"

    - name: Configure podman socket service to use custom storage
      # Mirrors roles/common/templates/override.conf.j2.
      ansible.builtin.copy:
        dest: "{{ ansible_user_dir }}/.config/systemd/user/podman.service.d/override.conf"
        mode: '0644'
        content: |
          [Service]
          Environment=CONTAINERS_STORAGE_CONF={{ aap_storage_conf }}

    - name: Reload systemd and restart podman socket
      # Must restart after override.conf so the daemon picks up custom storage
      # before images are loaded or volumes are created.
      ansible.builtin.systemd:
        name: podman.socket
        scope: user
        daemon_reload: true
        state: restarted

    - name: Create podman wrapper script for ansible-runner EE spawning
      # Mirrors roles/common/files/podman.
      # Mounted into the receptor container at /usr/bin/podman:ro,z.
      # Uses podman-remote (no libseccomp dependency) which communicates
      # with the host podman daemon via the mounted socket.
      ansible.builtin.copy:
        dest: "{{ aap_podman_path }}"
        mode: '0755'
        content: |
          #!/bin/bash

          exec /usr/bin/podman-remote "$@"

    # ------------------------------------------------------------------
    # 4. Extract CA trust bundle
    #    Restores ~/aap/tls/extracted/ — bind-mounted into receptor
    #    container at /etc/pki/ca-trust/extracted.
    # ------------------------------------------------------------------
    - name: Extract CA trust bundle
      ansible.builtin.command:
        cmd: >-
          tar -xzf {{ bundle_dir | default(playbook_dir) }}/ca-trust-extracted.tar.gz
          -C {{ ca_tls_dir }}
      args:
        creates: "{{ ca_tls_dir }}/extracted"
      changed_when: true

    # ------------------------------------------------------------------
    # 4b. Trust the Automation Hub container registry
    #     Mirrors common/hub_registry.yml — lets podman on this node pull EE
    #     images from the private Automation Hub over TLS at job runtime.
    #     hub_registries (a list of "<host>:<port>") is captured from the
    #     controller's own certs.d by generate-exec-node-bundle.yml and written
    #     into inventory.yml. The ca.crt symlink targets the CA bundle restored
    #     in section 4. No-op when there is no hub (empty/undefined list).
    # ------------------------------------------------------------------
    - name: Configure Automation Hub registry trust
      when: hub_registries | default([]) | length > 0
      vars:
        _certsd: "{{ ansible_user_dir }}/.config/containers/certs.d"
      block:
        - name: Create hub registry certs.d directory
          ansible.builtin.file:
            path: "{{ _certsd }}/{{ item }}"
            state: directory
            mode: '0755'
          loop: "{{ hub_registries }}"

        - name: Link the AAP CA bundle as the registry ca.crt
          ansible.builtin.file:
            src: "{{ ca_tls_dir }}/extracted/pem/tls-ca-bundle.pem"
            dest: "{{ _certsd }}/{{ item }}/ca.crt"
            state: link
            force: true
          loop: "{{ hub_registries }}"

        - name: Create hostname alias for :443 registries
          ansible.builtin.file:
            src: "{{ _certsd }}/{{ item }}"
            dest: "{{ _certsd }}/{{ item.split(':')[0] }}"
            state: link
            force: true
          loop: "{{ hub_registries }}"
          when: item is search(':443$')

    # ------------------------------------------------------------------
    # 5. Deploy receptor config and TLS certificates
    #    Mirrors roles/receptor/tasks/config.yml and tls.yml.
    #    All files land in ~/aap/receptor/etc/ (receptor_conf_dir).
    # ------------------------------------------------------------------
    - name: Deploy receptor.conf
      ansible.builtin.copy:
        src: "{{ bundle_dir | default(playbook_dir) }}/receptor.conf"
        dest: "{{ receptor_conf_dir }}/receptor.conf"
        mode: '0640'
      notify: Restart receptor

    - name: Deploy receptor private key
      ansible.builtin.copy:
        src: "{{ bundle_dir | default(playbook_dir) }}/certs/receptor.key"
        dest: "{{ receptor_conf_dir }}/receptor.key"
        mode: '0400'
      notify: Restart receptor

    - name: Deploy receptor certificate
      ansible.builtin.copy:
        src: "{{ bundle_dir | default(playbook_dir) }}/certs/receptor.crt"
        dest: "{{ receptor_conf_dir }}/receptor.crt"
        mode: '0640'
      notify: Restart receptor

    - name: Deploy mesh CA certificate
      ansible.builtin.copy:
        src: "{{ bundle_dir | default(playbook_dir) }}/certs/mesh-CA.crt"
        dest: "{{ receptor_conf_dir }}/mesh-CA.crt"
        mode: '0640'
      notify: Restart receptor

    - name: Deploy work signing public key
      # Mirrors roles/receptor/tasks/facts.yml — signing_public.pem is only
      # mounted into the container for execution nodes (not hop nodes).
      ansible.builtin.copy:
        src: "{{ bundle_dir | default(playbook_dir) }}/certs/signing_public.pem"
        dest: "{{ receptor_conf_dir }}/signing_public.pem"
        mode: '0644'
      when: node_type == 'execution'
      notify: Restart receptor

    # ------------------------------------------------------------------
    # 6. Create named podman volumes for receptor runtime data
    #    Mirrors roles/receptor/tasks/volumes.yml exactly.
    # ------------------------------------------------------------------
    - name: Create named podman volumes for receptor
      containers.podman.podman_volume:
        name: "{{ item }}"
        state: present
      loop:
        - receptor_run
        - receptor_runner
        - receptor_home
        - receptor_data

    # ------------------------------------------------------------------
    # 7. Load container images from bundle
    #    Mirrors roles/common/tasks/main.yml, which loads images into two
    #    separate stores:
    #      - the receptor image is a CONTROL-PLANE image → podman's default
    #        rootless store (no CONTAINERS_STORAGE_CONF). The receptor container
    #        is created from here by the host podman CLI (section 9).
    #      - EE images are EXECUTION-PLANE images → the custom aap store, loaded
    #        with CONTAINERS_STORAGE_CONF so the podman socket daemon (pointed at
    #        the aap store via override.conf) can run them when receptor spawns
    #        work. Hop nodes have no EE tarballs, so that loop is a no-op there.
    # ------------------------------------------------------------------
    - name: Load the receptor image into the default rootless store
      containers.podman.podman_load:
        input: "{{ bundle_dir | default(playbook_dir) }}/images/receptor-rhel9.tar.gz"

    - name: Find EE images in bundle (execution nodes only)
      ansible.builtin.find:
        paths: "{{ bundle_dir | default(playbook_dir) }}/images"
        patterns: "ee-*.tar.gz"
      register: _bundle_ee_images

    - name: Load EE images into the custom aap execution-plane store
      containers.podman.podman_load:
        input: "{{ item.path }}"
      environment:
        CONTAINERS_STORAGE_CONF: "{{ aap_storage_conf }}"
      loop: "{{ _bundle_ee_images.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    # ------------------------------------------------------------------
    # 8. Detect loaded receptor image name
    # ------------------------------------------------------------------
    - name: Get loaded receptor image name
      ansible.builtin.command:
        cmd: >-
          podman images --format "{{ '{{' }}.Repository{{ '}}' }}:{{ '{{' }}.Tag{{ '}}' }}"
          --filter "reference=*receptor*"
      register: _loaded_receptor_image
      changed_when: false

    - name: Set receptor image fact from loaded image
      ansible.builtin.set_fact:
        _receptor_image_to_use: "{{ _loaded_receptor_image.stdout_lines[0] | trim }}"
      when:
        - _loaded_receptor_image.stdout_lines | length > 0
        - _loaded_receptor_image.stdout_lines[0] | trim | length > 0

    - name: Fall back to inventory receptor_image if auto-detect failed
      ansible.builtin.set_fact:
        _receptor_image_to_use: "{{ receptor_image }}"
      when: _receptor_image_to_use is not defined

    # ------------------------------------------------------------------
    # 9. Create the receptor container and generate systemd unit
    #    Mirrors roles/receptor/tasks/containers.yml exactly.
    #
    #    containers.podman.podman_container with generate_systemd:
    #      - Creates the container (state: created) via the host podman CLI,
    #        which reads the receptor image from the default rootless store
    #        (where section 7 loaded it) — same as the installer
    #      - Generates receptor.service into ~/.config/systemd/user/
    #      - The mounted podman socket (aap store via override.conf) is used at
    #        runtime when receptor spawns EE containers, not to create receptor
    #      - recreate: true ensures re-runs apply updated config
    #
    #    Volume layout matches roles/receptor/tasks/facts.yml:
    #      Named volumes (:U)    → receptor_run, runner, home, data
    #      Bind mounts (:ro,z)   → receptor.conf, certs, signing key
    #      Bind mounts (:z)      → CA trust, podman wrapper, socket,
    #                              job_execution, projects
    #
    #    signing_public.pem is only added for execution nodes — mirrors
    #    facts.yml: "when: _receptor_type in ['control','execution','hybrid']"
    #    Hop nodes do not get the signing key volume.
    # ------------------------------------------------------------------
    - name: Set base receptor container volumes
      ansible.builtin.set_fact:
        _receptor_volumes:
          - "{{ ca_tls_dir }}/extracted:/etc/pki/ca-trust/extracted:z"
          - "{{ aap_podman_path }}:/usr/bin/podman:ro,z"
          - "{{ receptor_conf_dir }}/receptor.conf:/etc/receptor/receptor.conf:ro,z"
          - "{{ receptor_conf_dir }}/receptor.crt:/etc/receptor/tls/receptor.crt:ro,z"
          - "{{ receptor_conf_dir }}/receptor.key:/etc/receptor/tls/receptor.key:ro,z"
          - "{{ receptor_conf_dir }}/mesh-CA.crt:/etc/receptor/tls/ca/mesh-CA.crt:ro,z"
          - "receptor_run:/run/receptor:U"
          - "receptor_runner:/home/runner:U"
          - "receptor_home:{{ ansible_user_dir }}:U"
          - "receptor_data:/var/lib/receptor:U"
          - "/run/user/{{ ansible_user_uid }}/podman/podman.sock:/run/user/{{ ansible_user_uid }}/podman/podman.sock:z"
          - "{{ controller_data_dir }}/job_execution:{{ controller_data_dir }}/job_execution:z"
          - "{{ controller_data_dir }}/projects:{{ controller_data_dir }}/projects:z"

    - name: Add signing public key volume for execution nodes
      # Mirrors roles/receptor/tasks/facts.yml — only execution (not hop) nodes
      # verify work unit signatures, so only they need the signing public key.
      ansible.builtin.set_fact:
        _receptor_volumes: "{{ _receptor_volumes + [_signing_vol] }}"
      vars:
        _signing_vol: "{{ receptor_conf_dir }}/signing_public.pem:/etc/receptor/signing_public.pem:ro,z"
      when: node_type == 'execution'

    - name: Create the receptor container
      containers.podman.podman_container:
        name: receptor
        image: "{{ _receptor_image_to_use }}"
        image_volume: ignore
        command: /usr/bin/receptor --config /etc/receptor/receptor.conf
        generate_systemd:
          container_prefix: ''
          path: "{{ ansible_user_dir }}/.config/systemd/user"
          separator: ''
        log_driver: "{{ container_log_driver | default('journald') }}"
        user: "{{ ansible_user_uid }}"
        userns: keep-id
        network: host
        security_opt:
          - label=disable
        env:
          HOME: "{{ ansible_user_dir }}"
          RECEPTORCTL_SOCKET: /run/receptor/receptor.sock
          CONTAINER_HOST: "unix://run/user/{{ ansible_user_uid }}/podman/podman.sock"
        label:
          io.containers.autoupdate: local
        volume: "{{ _receptor_volumes }}"
        state: created
        recreate: true
      notify: Restart receptor

    # ------------------------------------------------------------------
    # 10. Enable and start receptor service via systemd
    #     Mirrors roles/receptor/tasks/systemd.yml.
    # ------------------------------------------------------------------
    - name: Enable and start receptor service
      ansible.builtin.systemd:
        name: receptor.service
        state: started
        enabled: true
        scope: user
        daemon_reload: true

    # ------------------------------------------------------------------
    # 11. Open firewall port (if firewalld is running)
    #     Mirrors roles/receptor/tasks/firewalld.yml.
    # ------------------------------------------------------------------
    - name: Check if firewalld is running
      ansible.builtin.command:
        cmd: firewall-cmd --state
      register: _firewalld_state
      changed_when: false
      failed_when: false

    - name: Ensure python3-firewall is installed (required by the firewalld module)
      # Mirrors common/firewalld.yml — ansible.posix.firewalld needs the firewall
      # python bindings. Normally pulled in by the firewalld RPM, but the
      # installer installs it explicitly; do the same when firewalld is running.
      ansible.builtin.package:
        name: python3-firewall
        state: present
      become: true
      when: _firewalld_state.rc == 0

    - name: Open receptor port in firewall
      ansible.posix.firewalld:
        port: "{{ receptor_port }}/{{ receptor_protocol }}"
        permanent: true
        state: enabled
        immediate: true
        zone: public
      become: true
      when: _firewalld_state.rc == 0

    # ------------------------------------------------------------------
    # 12. Verify receptor is running
    # ------------------------------------------------------------------
    - name: Verify receptor service is active
      ansible.builtin.command:
        cmd: systemctl --user is-active receptor.service
      register: _receptor_service_status
      changed_when: false
      retries: 30
      delay: 6
      until: _receptor_service_status.rc == 0

    - name: Show receptor service status
      ansible.builtin.command:
        cmd: systemctl --user status receptor.service --no-pager
      register: _receptor_status_output
      changed_when: false
      failed_when: false

    - name: Display receptor service status
      ansible.builtin.debug:
        msg: "{{ _receptor_status_output.stdout }}"

    - name: Display installation summary
      ansible.builtin.debug:
        msg: |
          ===============================================================
          Receptor installed successfully
          ===============================================================

          Node     : {{ node_hostname }} ({{ node_type }})
          Port     : {{ receptor_port }}/{{ receptor_protocol }}
          Image    : {{ _receptor_image_to_use }}
          Config   : {{ receptor_conf_dir }}/receptor.conf
          Service  : receptor.service (user scope)

          Useful commands:
            systemctl --user status receptor.service
            systemctl --user restart receptor.service
            podman logs receptor
            journalctl --user -u receptor.service -f

          Verify in AAP UI (on the controller):
            Administration -> Instances -> {{ node_hostname }}
            Administration -> Topology View
          ===============================================================

  handlers:
    - name: Restart receptor
      # Mirrors roles/receptor/handlers/main.yml
      ansible.builtin.systemd:
        name: receptor.service
        scope: user
        state: restarted
        daemon_reload: true
      failed_when: false
